<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkPin – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      color: #374151;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: float 2.5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #6b7280; font-size: 0.95rem; line-height: 1.6; max-width: 280px; }
    .note {
      margin-top: 2rem;
      background: #eef2ff;
      color: #4338ca;
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
    }
    button {
      margin-top: 2rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 1rem;
      padding: 0.875rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📍</div>
  <h1>You're offline</h1>
  <p>No internet connection detected. Your saved parking spot is still accessible — go back to the app.</p>
  <div class="note">
    ✓ Your parking data is saved locally and available offline.
  </div>
  <button onclick="window.location.href='/'">Go to ParkPin</button>
</body>
</html>
